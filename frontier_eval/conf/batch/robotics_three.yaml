version: 1

tasks:
  - quadruped_gait
  - flash_attention
  - pid_tuning

algorithms:
  - name: openevolve
    overrides:
      - algorithm.iterations=10

llms:
  - name: openai__gpt-4o-mini
    api_base: https://api.openai.com/v1
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

llm_config: openai_compatible

common_overrides:
  - llm.temperature=0.7
  - llm.timeout=60

run:
  name: robotics_three
  base_dir: runs/batch
  max_parallel: 3
  fail_fast: false
